google_api:
  project_id: ""
  api_key: ""
  location: "us-central1"

lipsync:
  provider: "wav2lip_zerogpu_hf"
  space_id: "fatma812/Wav2lip-ZeroGPU2"
  api_name: "/run_inference"
  fn_index: 0
  preprocess: "crop"
  still_mode: true
  use_face_enhancer: false
  batch_size: 2
  face_model_resolution: "256"
  pose_style: 0

huggingface:
  # Legacy experimental settings. Official LivePortrait is video-driven, not audio-driven.
  liveportrait_space_id: "KwaiVGI/LivePortrait"
  api_name: "/predict"

audio:
  bpm_default: 120
  onset_backtrack: true
  onset_min_gap: 0.5
  max_duration_seconds: 30
  # "sections" keeps API usage predictable; "beats" cuts on detected onsets.
  segment_mode: "sections"
  section_count: 1

paths:
  inputs_dir: "../inputs"
  outputs_dir: "../outputs"
